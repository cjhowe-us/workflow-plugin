name: workflow CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: ruff check
        run: uvx ruff check workflow
      - name: ruff format --check
        run: uvx ruff format --check workflow

  pytest:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout workflow
        uses: actions/checkout@v4
        with:
          path: workflow

      # Sibling checkout — workflow/tests/conftest.py and pyproject.toml's
      # pythonpath both expect ../artifact/artifact/scripts to exist so the
      # `artifactlib` import resolves without publishing artifact to PyPI.
      - name: Checkout sibling artifact plugin
        uses: actions/checkout@v4
        with:
          repository: cjhowe-us/artifact
          path: artifact

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: workflow/workflow/pyproject.toml

      - name: Install workflow + dev deps
        working-directory: workflow/workflow
        run: uv pip install --system -e ".[dev]"

      - name: Run pytest
        working-directory: workflow/workflow
        run: python -m pytest -v
