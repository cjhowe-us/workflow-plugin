repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uvx ty check --project workflow
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

  # Inherit `new-file-tests` from python-plugin (single source of truth).
  - repo: https://github.com/cjhowe-us/python-plugin
    rev: v0.3.0
    hooks:
      - id: new-file-tests
