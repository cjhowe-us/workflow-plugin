# Data for structural sanity evals. Runner: ./run.sh
# Paths are relative to the workflow repo root.

agents:
  globs:
    - "harmonize/agents/*.md"
  required_fields:
    - name
    - description
    - model
    - tools
  model_regex: "^(opus|sonnet|haiku|inherit)$"
  description_min_length: 50
  description_max_length: 5000
  tools_min_length: 1
  body_min_lines: 5
  body_require_h1: true

hook_scripts:
  globs:
    - "harmonize/hooks/*.sh"
    - "rumdl/hooks/*.sh"
  require_executable: true
  require_shebang: true
  require_shellcheck_clean: true

hooks_json:
  files:
    - "harmonize/hooks/hooks.json"
    - "rumdl/hooks/hooks.json"
  require_commands_resolve: true

# Cursor plugin hooks: camelCase events, commands relative to each plugin root
# (see https://cursor.com/docs/reference/plugins — manifest "hooks" overrides hooks/hooks.json discovery).
hooks_json_cursor_plugins:
  files:
    - "harmonize/hooks/hooks.cursor.json"
    - "rumdl/hooks/hooks.cursor.json"
  require_commands_resolve: true

plugin_manifests:
  files:
    - "harmonize/.claude-plugin/plugin.json"
    - "rumdl/.claude-plugin/plugin.json"
  required_fields:
    - name
    - version
    - description
